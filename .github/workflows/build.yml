name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Build and test
        shell: pwsh
        run: .\src\build.ps1 -NoPause
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameLauncherBot
          path: client
