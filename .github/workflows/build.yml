name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install deps
        run: pip install pyinstaller pyautogui pygetwindow
      
      - name: Build exe
        run: pyinstaller --onefile --noconsole app.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: dist/app.exe